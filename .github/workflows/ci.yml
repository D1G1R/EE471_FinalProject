name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Backend testleri
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest

      - name: Lint with flake8
        run: flake8 . --max-line-length=120 --exclude=venv,migrations

      - name: Run Django checks
        run: python manage.py check
        env:
          DJANGO_SECRET_KEY: test-secret-key
          DEBUG: "True"

  # Docker build testi
  docker-build:
    runs-on: ubuntu-latest
    needs: backend-test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t voice-controller-backend ./backend

      - name: Test Docker container starts
        run: |
          docker run -d --name test-container \
            -e DJANGO_SECRET_KEY=test \
            -e DEBUG=True \
            -p 8000:8000 \
            voice-controller-backend
          sleep 5
          curl -f http://localhost:8000/api/spotify/login/ || exit 1
          docker stop test-container

  # Flutter analiz
  flutter-analyze:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./mobile
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.0"

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze

      - name: Run tests
        run: flutter test